name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'PhotoHelper ${{ github.ref_name }}'
          releaseBody: |
            ## PhotoHelper ${{ github.ref_name }}

            ### 下载安装
            - **Windows 安装包**：下载 `PhotoHelper_*_x64_en-US.msi` 双击安装即可
            - Windows 11 内置 WebView2，Windows 10 安装包会自动处理运行时依赖
          releaseDraft: false
          prerelease: false
